<h3>Login</h3>
<form [formGroup]="form" (ngSubmit)="submit()">
  <div>
    <label>Username:<br />
      <input formControlName="username" autofocus />
    </label>
  </div>
  <div>
    <label>Password:<br />
      <input type="password" formControlName="password" />
    </label>
  </div>
  <button type="submit">Log in</button>
</form>
