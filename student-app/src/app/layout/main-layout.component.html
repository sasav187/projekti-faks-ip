<mat-sidenav-container class="layout-container">

  <mat-sidenav #drawer mode="over" class="sidenav">

    <mat-nav-list>
      <a mat-list-item routerLink="/" (click)="drawer.close()">
        <mat-icon>home</mat-icon>
        <span>Home</span>
      </a>

      <a mat-list-item routerLink="/cv" (click)="drawer.close()">
        <mat-icon>description</mat-icon>
        <span>My CV</span>
      </a>

      <a mat-list-item routerLink="/internships" (click)="drawer.close()">
        <mat-icon>work</mat-icon>
        <span>Internships</span>
      </a>

      <a mat-list-item routerLink="/recommendations" (click)="drawer.close()">
        <mat-icon>smart_toy</mat-icon>
        <span>Recommendations</span>
      </a>

      <a mat-list-item routerLink="/worklog" (click)="drawer.close()">
        <mat-icon>event-note</mat-icon>
        <span>Internships</span>
      </a>

      <a mat-list-item (click)="logout(); drawer.close()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </a>
    </mat-nav-list>

  </mat-sidenav>


  <mat-sidenav-content>

    <mat-toolbar color="primary" class="toolbar mat-elevation-z4">

      <button mat-icon-button class="menu-button" (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
      </button>

      <button mat-button class="logo" routerLink="/">
        <mat-icon>school</mat-icon>
        Student Portal
      </button>

      <span class="spacer"></span>

      <div class="desktop-menu">
        <button mat-button routerLink="/">
          <mat-icon>home</mat-icon>
          Home
        </button>

        <button mat-button routerLink="/cv">
          <mat-icon>description</mat-icon>
          My CV
        </button>

        <button mat-button routerLink="/internships">
          <mat-icon>work</mat-icon>
          Internships
        </button>

        <button mat-button routerLink="/recommendations">
          <mat-icon>smart_toy</mat-icon>
          Recommendations
        </button>

        <button mat-button routerLink="/worklog">
          <mat-icon>event_note</mat-icon>
          Worklog
        </button>

        <button mat-button color="warn" (click)="logout()">
          <mat-icon>logout</mat-icon>
          Logout
        </button>
      </div>

    </mat-toolbar>

    <div class="content">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
