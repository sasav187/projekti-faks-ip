<h2 class="page-title">Internships</h2>

<div class="search-container">
  <mat-form-field appearance="outline">
    <mat-label>Title</mat-label>
    <input matInput [(ngModel)]="searchTitle" placeholder="Search by title">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Technology</mat-label>
    <input matInput [(ngModel)]="searchTechnology" placeholder="Search by technology">
  </mat-form-field>

  <button mat-raised-button color="primary" (click)="onSearch()">
    <mat-icon>search</mat-icon> Search
  </button>

  <button mat-raised-button color="warn" (click)="clearSearch()">
    <mat-icon>clear</mat-icon> Clear
  </button>
</div>

<div *ngIf="loading" class="loading">
  <mat-spinner></mat-spinner>
</div>

<div *ngIf="errorMessage" class="error">
  {{ errorMessage }}
</div>

<div *ngIf="internships$ | async as internships">
  <div *ngIf="!loading && internships.length === 0 && !errorMessage">
    No internships available.
  </div>

  <div *ngIf="internships.length > 0" class="internship-container">
    <mat-card class="internship-card" *ngFor="let i of internships">
      <mat-card-title>{{ i.title }}</mat-card-title>
      <mat-card-subtitle>{{ i.companyName }}</mat-card-subtitle>
      <mat-card-content>
        <p>{{ i.description }}</p>
        <div class="details">
          <span><strong>Period:</strong> {{ i.period }}</span>
          <span><strong>Capacity:</strong> {{ i.capacity }}</span>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
