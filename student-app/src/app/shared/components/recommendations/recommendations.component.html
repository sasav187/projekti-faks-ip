<h2 class="page-title">Recommended Internships</h2>

<div *ngIf="loading" class="loading">
    <mat-spinner></mat-spinner>
</div>

<div *ngIf="errorMessage" class="error">
    {{ errorMessage }}
</div>

<div class="cards-container" *ngIf="recommendations.length > 0">

    <mat-card class="rec-card" *ngFor="let r of recommendations">

        <mat-card-header>
            <mat-card-title>
                Internship #{{ r.internshipId }}
            </mat-card-title>
            <mat-card-subtitle>
                Score: {{ r.score | number:'1.2-2' }}
            </mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <p>{{ r.explanation }}</p>
        </mat-card-content>

        <mat-card-actions>
            <button mat-button color="primary">
                View Internship
            </button>
        </mat-card-actions>

    </mat-card>

</div>

<div *ngIf="!loading && recommendations.length === 0">
    No recommendations available.
</div>
