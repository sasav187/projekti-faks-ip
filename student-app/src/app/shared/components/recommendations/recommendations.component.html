<h2 class="page-title">Recommended Internships</h2>

<div *ngIf="loading" class="loading">
    <mat-spinner></mat-spinner>
</div>

<div *ngIf="errorMessage" class="error">
    {{ errorMessage }}
</div>

<div *ngIf="recommendations$ | async as recommendations">
    <div *ngIf="recommendations.length > 0; else noRecs" class="cards-container">
        <mat-card class="rec-card" *ngFor="let r of recommendations; let i = index">
            <mat-card-header>
                <mat-card-title>Internship #{{ i + 1 }}</mat-card-title>
                <mat-card-subtitle *ngIf="r.score !== undefined">Score: {{ r.score | number:'1.2-2' }}</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
                <p>{{ r.explanation }}</p>
            </mat-card-content>
            <mat-card-actions>
                <button mat-button color="primary" [routerLink]="['/internships', r.internshipId]">
                    View Internship
                </button>
            </mat-card-actions>
        </mat-card>
    </div>
</div>

<ng-template #noRecs>
    <div *ngIf="!loading">No recommendations available.</div>
</ng-template>
