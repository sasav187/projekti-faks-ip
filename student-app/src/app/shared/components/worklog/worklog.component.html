<mat-card class="worklog-card">
  <mat-card-header>
    <mat-card-title>Weekly Work Log</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form class="worklog-form">
      <mat-form-field appearance="fill" class="input-field">
        <mat-label>Week number</mat-label>
        <input matInput type="number" min="1" max="52" [(ngModel)]="weekNumber" name="weekNumber">
      </mat-form-field>

      <mat-form-field appearance="fill" class="input-field full-width">
        <mat-label>Activities</mat-label>
        <textarea matInput rows="4" [(ngModel)]="description" name="description"></textarea>
      </mat-form-field>

      <button mat-raised-button color="primary" (click)="save()">Save</button>
    </form>
  </mat-card-content>
</mat-card>

<mat-card class="previous-logs">
  <mat-card-header>
    <mat-card-title>Previous Logs</mat-card-title>
  </mat-card-header>

  <mat-card-content>

    <div *ngIf="logs && logs.length; else emptyLogs">

      <div *ngFor="let log of logs" class="log-item">
        <div class="log-text">
          <div class="week"><strong>Week {{log.weekNumber}}</strong></div>
          <div class="desc">{{log.description}}</div>
          <div class="created">
            {{log.createdAt ? (log.createdAt | date:'short') : 'No date'}}
          </div>
        </div>

        <button mat-icon-button color="warn" (click)="delete(log.id!)">
          <mat-icon>delete</mat-icon>
        </button>
      </div>

    </div>

    <ng-template #emptyLogs>
      <p class="empty-message">No previous logs yet.</p>
    </ng-template>

  </mat-card-content>
</mat-card>
