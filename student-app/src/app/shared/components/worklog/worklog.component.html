<mat-card>
  <h2>Weekly Work Log</h2>

  <mat-form-field>
    <mat-label>Week number</mat-label>
    <input matInput type="number" [(ngModel)]="weekNumber">
  </mat-form-field>

  <mat-form-field appearance="fill" class="full-width">
    <mat-label>Activities</mat-label>
    <textarea matInput rows="5" [(ngModel)]="description"></textarea>
  </mat-form-field>

  <button mat-raised-button color="primary" (click)="save()">Save</button>
</mat-card>

<mat-list>
  <h3>Previous Logs</h3>
  <mat-list-item *ngFor="let log of logs">
    <strong>Week {{log.weekNumber}}:</strong> {{log.description}}
    <span class="created">({{log.createdAt | date:'short'}})</span>
    <button mat-icon-button color="warn" (click)="delete(log.id!)">
      <mat-icon>delete</mat-icon>
    </button>
  </mat-list-item>
</mat-list>
